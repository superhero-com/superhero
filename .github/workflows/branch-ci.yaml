name: Branch CI

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build e2e image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.e2e
          push: false
          load: true
          tags: superhero-e2e:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e tests
        run: docker run --rm --ipc=host --init -e CI=true superhero-e2e:latest
